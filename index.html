<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Путь к спокойствию</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    bg: '#14110f', card: '#1f1b18', 'card-alt': '#28231f',
                    fg: '#e8e0d6', muted: '#8a7e74', accent: '#8fa87a',
                    danger: '#c47a6c', bdr: '#342e29', inp: '#181412',
                },
                fontFamily: { sans: ['Nunito', 'sans-serif'] }
            }
        }
    }
    </script>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
<div id="app"></div>
<div id="toast" class="toast-message"></div>
<nav id="bottom-nav">
    <button data-tab="today" class="is-active" aria-label="Сегодня"><i class="fas fa-sun"></i><span>Сегодня</span></button>
    <button data-tab="assessment" aria-label="Оценка"><i class="fas fa-clipboard-check"></i><span>Оценка</span></button>
    <button data-tab="diary" aria-label="Дневник"><i class="fas fa-book-open"></i><span>Дневник</span></button>
    <button data-tab="actions" aria-label="Действия"><i class="fas fa-list-check"></i><span>Действия</span></button>
    <button data-tab="thoughts" aria-label="Мысли"><i class="fas fa-brain"></i><span>Мысли</span></button>
    <button data-tab="health" aria-label="Здоровье"><i class="fas fa-heart-pulse"></i><span>Здоровье</span></button>
</nav>

<script src="js/state.js" defer></script>
<script src="js/utils.js" defer></script>
<script src="js/components.js" defer></script>
<script src="js/views/assessment.js" defer></script>
<script src="js/views/today.js" defer></script>
<script src="js/views/diary.js" defer></script>
<script src="js/views/actions.js" defer></script>
<script src="js/views/thoughts.js" defer></script>
<script src="js/views/health.js" defer></script>
<script src="js/handlers.js" defer></script>
<script src="js/app.js" defer></script>

</body>
</html>
